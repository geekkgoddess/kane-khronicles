[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm start"
  port = 3000

# Domain-specific redirects for author pen names
[[redirects]]
  from = "https://lyonahkane.com/*"
  to = "/genre/romance"
  status = 200
  force = true

[[redirects]]
  from = "https://solyxkane.com/*"
  to = "/genre/scifi"
  status = 200
  force = true

# Redirect all non-file requests to index.html (for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Form submissions
[[forms]]
  name = "newsletter"
  honeypot = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache control
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"